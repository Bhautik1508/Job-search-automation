# Render Blueprint — deploy the FastAPI backend
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: job-search-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel URL after deploying frontend
